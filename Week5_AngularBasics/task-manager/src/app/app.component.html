
<div class="app-shell">

    <a class="brand" routerLink="/tasks">
      <span class="brand-icon"></span>
      <span class="brand-name">TaskFlow</span>
    </a>
    <nav class="nav-links">
      <a routerLink="/tasks" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">

</div>
